name: CodeQL

# Closes the skill-repo security gap: skill repos ship python/js/shell scripts
# (skills/*/scripts, eval harnesses) that were previously never scanned.
# `languages: auto` lets CodeQL detect the languages actually present.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '30 4 * * 1'

permissions: {}

jobs:
  codeql:
    uses: netresearch/.github/.github/workflows/codeql.yml@main
    with:
      languages: auto
    permissions:
      contents: read
      security-events: write
      actions: read
