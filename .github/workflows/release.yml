name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-versions:
    name: Validate version consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate version sync
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          echo "Tag version: ${TAG_VERSION}"

          # Extract plugin.json version
          PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "plugin.json version: ${PLUGIN_VERSION}"

          # Extract SKILL.md metadata.version from frontmatter
          SKILL_FILE=""
          if [[ -f "SKILL.md" ]]; then
            SKILL_FILE="SKILL.md"
          else
            for f in skills/*/SKILL.md; do
              if [[ -f "$f" ]]; then
                SKILL_FILE="$f"
                break
              fi
            done
          fi

          SKILL_VERSION=""
          if [[ -n "${SKILL_FILE}" ]]; then
            SKILL_VERSION=$(sed -n '/^---$/,/^---$/p' "${SKILL_FILE}" \
              | grep -E '^\s*version:' \
              | head -1 \
              | sed 's/.*version:[[:space:]]*//' \
              | tr -d '"'"'")
            echo "SKILL.md version: ${SKILL_VERSION}"
          fi

          # Compare all three
          ERRORS=0
          if [[ "${TAG_VERSION}" != "${PLUGIN_VERSION}" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) != plugin.json version (${PLUGIN_VERSION})"
            ERRORS=1
          fi
          if [[ -n "${SKILL_VERSION}" && "${TAG_VERSION}" != "${SKILL_VERSION}" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) != SKILL.md metadata.version (${SKILL_VERSION})"
            ERRORS=1
          fi
          if [[ -n "${SKILL_VERSION}" && "${PLUGIN_VERSION}" != "${SKILL_VERSION}" ]]; then
            echo "::error::plugin.json version (${PLUGIN_VERSION}) != SKILL.md metadata.version (${SKILL_VERSION})"
            ERRORS=1
          fi

          if [[ ${ERRORS} -eq 1 ]]; then
            echo "::error::Version mismatch detected. Tag, plugin.json, and SKILL.md metadata.version must all match."
            exit 1
          fi
          echo "All versions match: ${TAG_VERSION}"

  release:
    needs: validate-versions
    uses: netresearch/skill-repo-skill/.github/workflows/release.yml@62b5061255e68d2364cc1112a9b18353f7bc8fdd # main
    permissions:
      contents: write
