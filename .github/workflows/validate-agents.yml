name: Validate AGENTS.md

on:
  push:
    paths: ['AGENTS.md', '**/AGENTS.md', 'skills/agent-rules/**']
  pull_request:
    paths: ['AGENTS.md', '**/AGENTS.md', 'skills/agent-rules/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    uses: netresearch/skill-repo-skill/.github/workflows/validate-agents.yml@main
    with:
      scripts-path: 'skills/agent-rules/scripts'
